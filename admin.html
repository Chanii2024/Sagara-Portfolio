<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagara Admin Portal | Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --card: #121212;
            --text: #e0e0e0;
            --accent: #d4af37;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card);
            padding: 3rem;
            border: 1px solid var(--glass-border);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* Dashboard Layout */
        .sidebar {
            width: 250px;
            background: var(--sidebar);
            border-right: 1px solid var(--glass-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 3rem;
            text-align: center;
        }

        .nav-link {
            padding: 1rem;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent);
        }

        .spacer {
            flex: 1;
        }

        .logout-btn {
            background: #222;
            color: #fff;
            border: none;
            padding: 1rem;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .header-row h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }

        .view-site-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1.5rem;
            text-decoration: none;
            border-radius: 30px;
        }

        /* Stats & Upload Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
        }

        .upload-section {
            background: var(--card);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 8px;
        }

        .preview-section {
            background: var(--card);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 8px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Forms */
        input,
        select {
            width: 100%;
            padding: 12px;
            background: #080808;
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 1rem;
        }

        .file-drop {
            border: 2px dashed #444;
            padding: 2rem;
            text-align: center;
            color: #666;
            margin-bottom: 1rem;
        }

        .accent-btn {
            background: var(--accent);
            color: #000;
            width: 100%;
            border: none;
            padding: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Gallery Grid Mini */
        .mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .mini-item {
            aspect-ratio: 1;
            background: #000;
            position: relative;
        }

        .mini-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .mini-item:hover img {
            opacity: 1;
        }

        .mini-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: 0.6rem;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 2px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Login -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 class="brand">Sagara Admin</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="accent-btn" onclick="handleLogin()">Access Dashboard</button>
            <p id="login-msg" style="color: red; margin-top: 1rem;"></p>
        </div>
    </div>

    <!-- Dashboard (Hidden) -->
    <div id="dashboard-ui" style="display: none; width: 100%; display: flex;">
        <div class="sidebar">
            <div class="brand">Sagara<br>Portal</div>
            <div class="nav-link active">Dashboard</div>
            <div class="nav-link">Analytics</div>
            <div class="nav-link">Settings</div>
            <div class="spacer"></div>
            <button class="logout-btn" onclick="handleLogout()">Log Out</button>
        </div>

        <div class="main-content">
            <div class="header-row">
                <h1>Manage Portfolio</h1>
                <a href="gallery.html" target="_blank" class="view-site-btn">View Live Gallery &nearr;</a>
            </div>

            <div class="dashboard-grid">
                <!-- Left: Upload -->
                <div class="upload-section">
                    <h3 style="margin-bottom: 1.5rem; color: var(--accent);">Upload New Masterpiece</h3>
                    <form id="uploadForm">
                        <input type="text" id="title" placeholder="Image Title" required>
                        <select id="category">
                            <option value="Presidential">Presidential Collection</option>
                            <option value="Concerts">Live Concerts</option>
                            <option value="Portrait">Portraits</option>
                            <option value="Documentary">Documentary</option>
                            <option value="Architectural">Architectural</option>
                            <option value="Nature">Nature & Wildlife</option>
                        </select>

                        <div class="file-drop" onclick="document.getElementById('fileInput').click()">
                            <p id="file-label">Click to Select Image</p>
                            <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        </div>
                        <img id="preview-img" style="max-width: 100%; margin-bottom: 1rem; display: none;">

                        <button type="submit" class="accent-btn">Upload to Server</button>
                        <p id="upload-msg" style="margin-top: 1rem; text-align: center;"></p>
                    </form>
                </div>

                <!-- Right: Recent -->
                <div class="preview-section">
                    <h3 style="margin-bottom: 1rem;">Recent Uploads</h3>
                    <p style="color: #666; font-size: 0.9rem;">Total Images: <span id="img-count">0</span></p>
                    <div class="mini-grid" id="mini-grid">
                        <!-- Items injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let TOKEN = localStorage.getItem('sagara_token');

        // Check Auth on Load
        if (TOKEN) {
            showDashboard();
        }

        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('sagara_token', data.token);
                    showDashboard();
                } else {
                    document.getElementById('login-msg').innerText = "Invalid Credentials";
                }
            } catch (e) { console.error(e); }
        }

        function handleLogout() {
            localStorage.removeItem('sagara_token');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('dashboard-ui').style.display = 'flex';
            loadStats();
        }

        // Preview File
        document.getElementById('fileInput').onchange = (e) => {
            if (e.target.files[0]) {
                document.getElementById('file-label').innerText = e.target.files[0].name;
                const src = URL.createObjectURL(e.target.files[0]);
                const img = document.getElementById('preview-img');
                img.src = src; img.style.display = 'block';
            }
        };

        // Upload
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Processing...";

            const fd = new FormData();
            fd.append('title', document.getElementById('title').value);
            fd.append('category', document.getElementById('category').value);
            fd.append('image', document.getElementById('fileInput').files[0]);

            try {
                const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
                const d = await res.json();
                if (d.success) {
                    document.getElementById('upload-msg').innerText = "Uploaded Successfully!";
                    document.getElementById('upload-msg').style.color = "var(--accent)";
                    e.target.reset();
                    document.getElementById('preview-img').style.display = 'none';
                    document.getElementById('file-label').innerText = "Click to Select Image";
                    loadStats(); // Refresh grid
                }
            } catch (err) {
                document.getElementById('upload-msg').innerText = "Upload Failed";
            }
            btn.innerText = "Upload to Server";
        };

        // Load Recent Images
        async function loadStats() {
            const res = await fetch(`${API}/images`);
            const images = await res.json();

            document.getElementById('img-count').innerText = images.length;
            const grid = document.getElementById('mini-grid');
            grid.innerHTML = '';

            images.forEach(img => {
                const div = document.createElement('div');
                div.className = 'mini-item';
                div.innerHTML = `
                    <img src="${img.imageUrl}" alt="${img.title}">
                    <div class="mini-badge">${img.category}</div>
                `;
                grid.appendChild(div);
            });
        }
    </script>
</body>

</html>
